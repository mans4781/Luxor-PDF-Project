name: Luxor PDF Reader — Windows installer

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to GitHub Releases (requires GH_RELEASES_TOKEN secret)"
        type: boolean
        default: false
  push:
    tags:
      - "reader-v*"

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 45
    env:
      # electron-builder reads GH_TOKEN when publishing to GitHub Releases.
      # Use a PAT with repo scope on the release repo configured in
      # artifacts/luxor-reader-desktop/package.json (publish.owner/repo).
      GH_TOKEN: ${{ secrets.GH_RELEASES_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      # The Replit workspace template blocks all non-Linux platform binaries
      # (rollup, tailwind oxide, esbuild, etc.) via `"pkg>dep": "-"` overrides
      # in pnpm-workspace.yaml to keep Linux installs slim. On the Windows
      # runner those binaries are required, so strip the blocks before
      # installing (CI-only change; the lockfile is re-resolved here).
      - name: Allow Windows platform binaries
        shell: bash
        run: |
          sed -i '/: "-"$/d' pnpm-workspace.yaml
          # The template also pins brace-expansion to ^2, which breaks
          # electron-builder (expects the newer named `expand` export).
          sed -i '/"brace-expansion"/d' pnpm-workspace.yaml

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Compile Electron main & preload
        run: pnpm --filter @workspace/luxor-reader-desktop run build

      - name: Build offline web bundle (luxor-pdf)
        run: pnpm --filter @workspace/luxor-reader-desktop run build:web-bundle

      - name: Decide publish mode
        id: mode
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/reader-v* || "${{ inputs.publish }}" == "true" ]]; then
            echo "flag=always" >> "$GITHUB_OUTPUT"
          else
            echo "flag=never" >> "$GITHUB_OUTPUT"
          fi

      - name: Build NSIS installer
        run: pnpm --filter @workspace/luxor-reader-desktop exec electron-builder --win --x64 --publish ${{ steps.mode.outputs.flag }}

      # Small (~200 KB) online installer that downloads the full setup from
      # GitHub Releases when run. Built with makensis (preinstalled on
      # windows-latest runners).
      - name: Build web-installer stub
        run: pnpm --filter @workspace/luxor-reader-desktop run dist:web-stub

      - name: Attach web-installer stub to the release
        if: steps.mode.outputs.flag == 'always'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GH_RELEASES_TOKEN }}
          REPO: mans4781/Luxor-PDF-Project
        run: |
          VERSION=$(node -p "require('./artifacts/luxor-reader-desktop/package.json').version")
          # electron-builder publishes the release under tag v<version> by
          # default; the CI trigger tag (reader-v*) is unrelated. Resolve
          # whichever release actually exists, failing early with a clear
          # message otherwise.
          TAG=""
          for CANDIDATE in "v${VERSION}" "${GITHUB_REF_NAME}"; do
            if [ -n "$CANDIDATE" ] && gh release view "$CANDIDATE" --repo "$REPO" >/dev/null 2>&1; then
              TAG="$CANDIDATE"
              break
            fi
          done
          if [ -z "$TAG" ]; then
            echo "::error::No GitHub release found for v${VERSION} or ${GITHUB_REF_NAME} on $REPO — cannot attach web-installer stub."
            exit 1
          fi
          echo "Uploading stub to release $TAG"
          gh release upload "$TAG" \
            "artifacts/luxor-reader-desktop/dist/Luxor PDF Reader Web Setup.exe" \
            --repo "$REPO" --clobber

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: luxor-pdf-reader-windows-installer
          path: |
            artifacts/luxor-reader-desktop/dist/*.exe
            artifacts/luxor-reader-desktop/dist/*.blockmap
            artifacts/luxor-reader-desktop/dist/latest.yml
          if-no-files-found: error
          retention-days: 30
