openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: PDF Expiry Tool API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: pdfs
    description: PDF management operations
  - name: license
    description: License, trial, and subscription status
  - name: usage
    description: Daily usage tracking and limits
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /pdfs/upload:
    post:
      operationId: uploadPdf
      tags: [pdfs]
      summary: Upload a PDF and set an expiry date
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                expiryDate:
                  type: string
                  format: date-time
                  description: ISO 8601 datetime after which the PDF expires (e.g. 2025-12-31T18:30:00.000Z)
                expiryAction:
                  type: string
                  enum: [corrupt, revoke]
                  description: |
                    What happens once the PDF expires.
                    - `corrupt`: the file is replaced with garbage bytes so PDF readers cannot open it.
                    - `revoke`: the file is deleted and the download endpoint returns 410 Gone.
                  default: revoke
              required:
                - file
                - expiryDate
                - expiryAction
      responses:
        "201":
          description: PDF uploaded successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PdfUploadResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "413":
          description: File too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pdfs/{id}:
    get:
      operationId: getPdf
      tags: [pdfs]
      summary: Get PDF metadata (requires shareToken)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: shareToken
          in: query
          required: true
          schema:
            type: string
          description: The share token returned at upload time
      responses:
        "200":
          description: PDF metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PdfRecord"
        "403":
          description: Forbidden – invalid or missing share token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: PDF not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deletePdf
      tags: [pdfs]
      summary: Delete a PDF (requires shareToken)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: shareToken
          in: query
          required: true
          schema:
            type: string
          description: The share token returned at upload time
      responses:
        "204":
          description: PDF deleted
        "403":
          description: Forbidden – invalid or missing share token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pdfs/{id}/download:
    get:
      operationId: downloadPdf
      tags: [pdfs]
      summary: Download the PDF (requires shareToken)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: shareToken
          in: query
          required: true
          schema:
            type: string
          description: The share token returned at upload time
      responses:
        "200":
          description: PDF file
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "403":
          description: Forbidden – invalid or missing share token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "410":
          description: PDF has expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pdfs/{id}/revoke/request:
    post:
      operationId: requestRevokeOtp
      tags: [pdfs]
      summary: Request a one-time code to revoke an expired PDF's expiry
      description: |
        Generates a 6-digit OTP that the company can share out-of-band with
        the recipient. Valid for 10 minutes. Returns the code in the response
        because there is no email service configured — in production this
        would be delivered to the company's contact email.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                shareToken:
                  type: string
                  description: Share token returned at upload time
              required:
                - shareToken
      responses:
        "201":
          description: OTP generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevokeOtpRequestResult"
        "403":
          description: Forbidden – invalid or missing share token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: PDF not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: PDF file no longer recoverable (already purged from disk)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pdfs/{id}/revoke/verify:
    post:
      operationId: verifyRevokeOtp
      tags: [pdfs]
      summary: Verify the OTP and extend the PDF's expiry date
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                shareToken:
                  type: string
                otpId:
                  type: integer
                code:
                  type: string
                  description: The 6-digit OTP shared by the company
                newExpiryDate:
                  type: string
                  format: date
                  description: New expiry date (YYYY-MM-DD) to apply to the PDF
              required:
                - shareToken
                - otpId
                - code
                - newExpiryDate
      responses:
        "200":
          description: Expiry revoked – PDF is accessible again
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PdfRecord"
        "400":
          description: Invalid OTP, expired OTP, or invalid date
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden – invalid share token or too many attempts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: PDF or OTP not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: PDF file no longer recoverable (already purged from disk)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pdfs/stats:
    get:
      operationId: getPdfStats
      tags: [pdfs]
      summary: Get statistics about uploaded PDFs
      responses:
        "200":
          description: Statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PdfStats"

  /license/status:
    get:
      operationId: getLicenseStatus
      tags: [license]
      summary: Get the caller's license, trial, and usage status
      description: |
        Returns the single source of truth used by the desktop and web apps to
        decide whether to allow PDF actions. Auto-provisions a license profile
        on first call after sign-in. All trial / subscription windows are
        computed against server time (UTC).

        At this stage paid-subscription fields (`isPaid`, `subscriptionActive`,
        `subscriptionDaysRemaining`, `subscriptionExpired`, `planName`) are
        always false / null — they will be wired up in the product-keys task.
      responses:
        "200":
          description: |
            Current license + trial + usage status. This endpoint always
            returns 200 — when the caller is not signed in it returns an
            "anonymous" payload (`loggedIn: false`, `lockReason:
            not_logged_in`, `canUsePdfTools: false`) so the marketing/landing
            pages can render without dealing with an error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LicenseStatus"

  /usage/check:
    post:
      operationId: checkUsage
      tags: [usage]
      summary: Check whether the caller is allowed to perform a PDF action
      description: |
        Non-mutating gate. Returns `{ allowed, lockReason }` based on trial
        validity and today's usage count. The frontend should call this
        before starting an action; after a successful action it should call
        `recordUsage` (which re-checks server-side).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UsageCheckBody"
      responses:
        "200":
          description: Result of the check
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsageCheckResult"
        "401":
          description: Caller is not signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /usage/record:
    post:
      operationId: recordUsage
      tags: [usage]
      summary: Record one successful PDF action against today's quota
      description: |
        Atomically increments today's usage row by 1 (and the matching
        category counter). Re-checks the cap server-side and returns 403 if
        the action would exceed the daily limit — clients must not bypass
        this by calling `recordUsage` without a prior `checkUsage`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UsageRecordBody"
      responses:
        "200":
          description: Usage recorded; returns the updated counts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsageRecordResult"
        "401":
          description: Caller is not signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Action blocked (trial expired, subscription expired, or daily limit reached)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsageRecordResult"

  /usage/today:
    get:
      operationId: getUsageToday
      tags: [usage]
      summary: Get today's usage breakdown for the caller
      responses:
        "200":
          description: Today's usage row (zero counters if nothing has been done today)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TodayUsage"
        "401":
          description: Caller is not signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    PdfRecord:
      type: object
      properties:
        id:
          type: integer
        originalName:
          type: string
        fileSize:
          type: integer
        expiryDate:
          type: string
          description: ISO 8601 datetime (or legacy YYYY-MM-DD) after which the PDF expires
        expiryAction:
          type: string
          enum: [corrupt, revoke]
        isExpired:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - originalName
        - fileSize
        - expiryDate
        - expiryAction
        - isExpired
        - createdAt
        - updatedAt

    PdfUploadResult:
      type: object
      properties:
        id:
          type: integer
        shareToken:
          type: string
          description: Token required for all subsequent operations on this document
        originalName:
          type: string
        fileSize:
          type: integer
        expiryDate:
          type: string
          description: ISO 8601 datetime after which the PDF expires
        expiryAction:
          type: string
          enum: [corrupt, revoke]
        isExpired:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - shareToken
        - originalName
        - fileSize
        - expiryDate
        - expiryAction
        - isExpired
        - createdAt
        - updatedAt

    PdfStats:
      type: object
      properties:
        total:
          type: integer
        active:
          type: integer
        expired:
          type: integer
        totalSize:
          type: integer
      required:
        - total
        - active
        - expired
        - totalSize

    RevokeOtpRequestResult:
      type: object
      properties:
        otpId:
          type: integer
          description: Identifier for this OTP attempt – pass back to the verify endpoint
        code:
          type: string
          description: |
            The 6-digit OTP. Returned in the response only because no email
            service is configured — in production this would be sent to the
            company's contact email so they can pass it to the recipient.
        expiresAt:
          type: string
          format: date-time
          description: Timestamp after which the OTP can no longer be used
      required:
        - otpId
        - code
        - expiresAt

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    PdfActionType:
      type: string
      description: |
        Identifier for a billable PDF action. Used by `checkUsage` and
        `recordUsage`. Mapped server-side to one of three categories:
        `edit`, `convert`, or `secure`.
      enum:
        - merge
        - split
        - extract_pages
        - delete_pages
        - insert_pages
        - pdf_to_image
        - pdf_to_word
        - pdf_to_excel
        - image_to_pdf
        - word_to_pdf
        - excel_to_pdf
        - password_protect
        - set_expiry
        - revoke_expiry
        - copy_restriction
        - print_restriction

    LicenseLockReason:
      type: string
      description: Why PDF tools are currently blocked, or `none` if allowed.
      enum:
        - none
        - not_logged_in
        - trial_expired
        - subscription_expired
        - daily_limit_reached
        - account_suspended

    LicenseStatusValue:
      type: string
      enum:
        - anonymous
        - trial
        - trial_expired
        - active
        - expired
        - suspended

    LicenseStatus:
      type: object
      description: Single source of truth for whether the caller can use PDF tools.
      properties:
        loggedIn:
          type: boolean
        trialActive:
          type: boolean
        trialDaysRemaining:
          type: integer
          description: Whole days remaining (rounded down). 0 once the trial has lapsed.
        trialExpired:
          type: boolean
        trialStartDate:
          type: ["string", "null"]
          format: date-time
          description: ISO 8601 server time when the trial started; null if not signed in.
        trialEndDate:
          type: ["string", "null"]
          format: date-time
        todayUsage:
          type: integer
          description: Total PDF actions the caller has performed today (server UTC date).
        dailyLimit:
          type: integer
          description: Maximum PDF actions allowed today. 5 during trial; effectively unlimited (a large number) for paid users.
        isPaid:
          type: boolean
          description: True when the caller has an active paid subscription. Always false at this stage.
        planName:
          type: ["string", "null"]
          description: Plan name when paid (e.g. "monthly", "yearly"); null otherwise.
        subscriptionActive:
          type: boolean
        subscriptionDaysRemaining:
          type: ["integer", "null"]
        subscriptionExpired:
          type: boolean
        subscriptionStartDate:
          type: ["string", "null"]
          format: date-time
        subscriptionEndDate:
          type: ["string", "null"]
          format: date-time
        licenseStatus:
          $ref: "#/components/schemas/LicenseStatusValue"
        canUsePdfTools:
          type: boolean
        lockReason:
          $ref: "#/components/schemas/LicenseLockReason"
        serverTime:
          type: string
          format: date-time
          description: Current server time at the moment this status was computed.
      required:
        - loggedIn
        - trialActive
        - trialDaysRemaining
        - trialExpired
        - trialStartDate
        - trialEndDate
        - todayUsage
        - dailyLimit
        - isPaid
        - planName
        - subscriptionActive
        - subscriptionDaysRemaining
        - subscriptionExpired
        - subscriptionStartDate
        - subscriptionEndDate
        - licenseStatus
        - canUsePdfTools
        - lockReason
        - serverTime

    UsageCheckBody:
      type: object
      properties:
        actionType:
          $ref: "#/components/schemas/PdfActionType"
      required:
        - actionType

    UsageCheckResult:
      type: object
      properties:
        allowed:
          type: boolean
        lockReason:
          $ref: "#/components/schemas/LicenseLockReason"
        todayUsage:
          type: integer
        dailyLimit:
          type: integer
      required:
        - allowed
        - lockReason
        - todayUsage
        - dailyLimit

    UsageRecordBody:
      type: object
      properties:
        actionType:
          $ref: "#/components/schemas/PdfActionType"
        fileCount:
          type: integer
          description: How many files this action processed. Each file counts as one against the daily quota. Defaults to 1.
          default: 1
          minimum: 1
      required:
        - actionType

    UsageRecordResult:
      type: object
      properties:
        recorded:
          type: boolean
          description: True if the increment was applied; false if blocked (in which case `lockReason` will explain).
        lockReason:
          $ref: "#/components/schemas/LicenseLockReason"
        todayUsage:
          type: integer
        dailyLimit:
          type: integer
      required:
        - recorded
        - lockReason
        - todayUsage
        - dailyLimit

    TodayUsage:
      type: object
      properties:
        usageDate:
          type: string
          description: Server UTC date in YYYY-MM-DD format.
        editCount:
          type: integer
        convertCount:
          type: integer
        secureCount:
          type: integer
        totalCount:
          type: integer
        dailyLimit:
          type: integer
      required:
        - usageDate
        - editCount
        - convertCount
        - secureCount
        - totalCount
        - dailyLimit
