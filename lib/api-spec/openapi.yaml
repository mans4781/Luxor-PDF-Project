openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: PDF Expiry Tool API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: pdfs
    description: PDF management operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /pdfs/upload:
    post:
      operationId: uploadPdf
      tags: [pdfs]
      summary: Upload a PDF and set an expiry date
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                expiryDate:
                  type: string
                  format: date
                  description: ISO date string (YYYY-MM-DD) after which the PDF becomes inaccessible
              required:
                - file
                - expiryDate
      responses:
        "201":
          description: PDF uploaded successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PdfUploadResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "413":
          description: File too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pdfs/{id}:
    get:
      operationId: getPdf
      tags: [pdfs]
      summary: Get PDF metadata (requires shareToken)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: shareToken
          in: query
          required: true
          schema:
            type: string
          description: The share token returned at upload time
      responses:
        "200":
          description: PDF metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PdfRecord"
        "403":
          description: Forbidden – invalid or missing share token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: PDF not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deletePdf
      tags: [pdfs]
      summary: Delete a PDF (requires shareToken)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: shareToken
          in: query
          required: true
          schema:
            type: string
          description: The share token returned at upload time
      responses:
        "204":
          description: PDF deleted
        "403":
          description: Forbidden – invalid or missing share token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pdfs/{id}/download:
    get:
      operationId: downloadPdf
      tags: [pdfs]
      summary: Download the PDF (requires shareToken)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: shareToken
          in: query
          required: true
          schema:
            type: string
          description: The share token returned at upload time
      responses:
        "200":
          description: PDF file
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "403":
          description: Forbidden – invalid or missing share token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "410":
          description: PDF has expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pdfs/{id}/revoke/request:
    post:
      operationId: requestRevokeOtp
      tags: [pdfs]
      summary: Request a one-time code to revoke an expired PDF's expiry
      description: |
        Generates a 6-digit OTP that the company can share out-of-band with
        the recipient. Valid for 10 minutes. Returns the code in the response
        because there is no email service configured — in production this
        would be delivered to the company's contact email.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                shareToken:
                  type: string
                  description: Share token returned at upload time
              required:
                - shareToken
      responses:
        "201":
          description: OTP generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevokeOtpRequestResult"
        "403":
          description: Forbidden – invalid or missing share token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: PDF not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: PDF file no longer recoverable (already purged from disk)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pdfs/{id}/revoke/verify:
    post:
      operationId: verifyRevokeOtp
      tags: [pdfs]
      summary: Verify the OTP and extend the PDF's expiry date
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                shareToken:
                  type: string
                otpId:
                  type: integer
                code:
                  type: string
                  description: The 6-digit OTP shared by the company
                newExpiryDate:
                  type: string
                  format: date
                  description: New expiry date (YYYY-MM-DD) to apply to the PDF
              required:
                - shareToken
                - otpId
                - code
                - newExpiryDate
      responses:
        "200":
          description: Expiry revoked – PDF is accessible again
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PdfRecord"
        "400":
          description: Invalid OTP, expired OTP, or invalid date
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden – invalid share token or too many attempts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: PDF or OTP not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: PDF file no longer recoverable (already purged from disk)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pdfs/stats:
    get:
      operationId: getPdfStats
      tags: [pdfs]
      summary: Get statistics about uploaded PDFs
      responses:
        "200":
          description: Statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PdfStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    PdfRecord:
      type: object
      properties:
        id:
          type: integer
        originalName:
          type: string
        fileSize:
          type: integer
        expiryDate:
          type: string
          format: date
        isExpired:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - originalName
        - fileSize
        - expiryDate
        - isExpired
        - createdAt
        - updatedAt

    PdfUploadResult:
      type: object
      properties:
        id:
          type: integer
        shareToken:
          type: string
          description: Token required for all subsequent operations on this document
        originalName:
          type: string
        fileSize:
          type: integer
        expiryDate:
          type: string
          format: date
        isExpired:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - shareToken
        - originalName
        - fileSize
        - expiryDate
        - isExpired
        - createdAt
        - updatedAt

    PdfStats:
      type: object
      properties:
        total:
          type: integer
        active:
          type: integer
        expired:
          type: integer
        totalSize:
          type: integer
      required:
        - total
        - active
        - expired
        - totalSize

    RevokeOtpRequestResult:
      type: object
      properties:
        otpId:
          type: integer
          description: Identifier for this OTP attempt – pass back to the verify endpoint
        code:
          type: string
          description: |
            The 6-digit OTP. Returned in the response only because no email
            service is configured — in production this would be sent to the
            company's contact email so they can pass it to the recipient.
        expiresAt:
          type: string
          format: date-time
          description: Timestamp after which the OTP can no longer be used
      required:
        - otpId
        - code
        - expiresAt

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
