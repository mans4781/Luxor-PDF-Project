openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: PDF Expiry Tool API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: pdfs
    description: PDF management operations
  - name: license
    description: License, trial, and subscription status
  - name: usage
    description: Daily usage tracking and limits
  - name: admin
    description: Admin-only operations (X-Admin-Token header required)
  - name: billing
    description: Stripe checkout + payment-provider registry
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /pdfs/upload:
    post:
      operationId: uploadPdf
      tags: [pdfs]
      summary: Upload a PDF and set an expiry date
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                expiryDate:
                  type: string
                  format: date-time
                  description: ISO 8601 datetime after which the PDF expires (e.g. 2025-12-31T18:30:00.000Z)
                expiryAction:
                  type: string
                  enum: [corrupt, revoke]
                  description: |
                    What happens once the PDF expires.
                    - `corrupt`: the file is replaced with garbage bytes so PDF readers cannot open it.
                    - `revoke`: the file is deleted and the download endpoint returns 410 Gone.
                  default: revoke
              required:
                - file
                - expiryDate
                - expiryAction
      responses:
        "201":
          description: PDF uploaded successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PdfUploadResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "413":
          description: File too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pdfs/{id}:
    get:
      operationId: getPdf
      tags: [pdfs]
      summary: Get PDF metadata (requires shareToken)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: shareToken
          in: query
          required: true
          schema:
            type: string
          description: The share token returned at upload time
      responses:
        "200":
          description: PDF metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PdfRecord"
        "403":
          description: Forbidden – invalid or missing share token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: PDF not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deletePdf
      tags: [pdfs]
      summary: Delete a PDF (requires shareToken)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: shareToken
          in: query
          required: true
          schema:
            type: string
          description: The share token returned at upload time
      responses:
        "204":
          description: PDF deleted
        "403":
          description: Forbidden – invalid or missing share token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pdfs/{id}/download:
    get:
      operationId: downloadPdf
      tags: [pdfs]
      summary: Download the PDF (requires shareToken)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: shareToken
          in: query
          required: true
          schema:
            type: string
          description: The share token returned at upload time
      responses:
        "200":
          description: PDF file
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "403":
          description: Forbidden – invalid or missing share token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "410":
          description: PDF has expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pdfs/{id}/revoke/request:
    post:
      operationId: requestRevokeOtp
      tags: [pdfs]
      summary: Request a one-time code to revoke an expired PDF's expiry
      description: |
        Generates a 6-digit OTP that the company can share out-of-band with
        the recipient. Valid for 10 minutes. Returns the code in the response
        because there is no email service configured — in production this
        would be delivered to the company's contact email.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                shareToken:
                  type: string
                  description: Share token returned at upload time
              required:
                - shareToken
      responses:
        "201":
          description: OTP generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevokeOtpRequestResult"
        "403":
          description: Forbidden – invalid or missing share token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: PDF not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: PDF file no longer recoverable (already purged from disk)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pdfs/{id}/revoke/verify:
    post:
      operationId: verifyRevokeOtp
      tags: [pdfs]
      summary: Verify the OTP and extend the PDF's expiry date
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                shareToken:
                  type: string
                otpId:
                  type: integer
                code:
                  type: string
                  description: The 6-digit OTP shared by the company
                newExpiryDate:
                  type: string
                  format: date
                  description: New expiry date (YYYY-MM-DD) to apply to the PDF
              required:
                - shareToken
                - otpId
                - code
                - newExpiryDate
      responses:
        "200":
          description: Expiry revoked – PDF is accessible again
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PdfRecord"
        "400":
          description: Invalid OTP, expired OTP, or invalid date
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden – invalid share token or too many attempts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: PDF or OTP not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: PDF file no longer recoverable (already purged from disk)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pdfs/stats:
    get:
      operationId: getPdfStats
      tags: [pdfs]
      summary: Get statistics about uploaded PDFs
      responses:
        "200":
          description: Statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PdfStats"

  /license/status:
    get:
      operationId: getLicenseStatus
      tags: [license]
      summary: Get the caller's license, trial, and usage status
      description: |
        Returns the single source of truth used by the desktop and web apps to
        decide whether to allow PDF actions. Auto-provisions a license profile
        on first call after sign-in. All trial / subscription windows are
        computed against server time (UTC).

        Paid-subscription fields (`isPaid`, `subscriptionActive`,
        `subscriptionDaysRemaining`, `subscriptionExpired`, `planName`) are
        populated when the caller has at least one active license row.
      responses:
        "200":
          description: |
            Current license + trial + usage status. This endpoint always
            returns 200 — when the caller is not signed in it returns an
            "anonymous" payload (`loggedIn: false`, `lockReason:
            not_logged_in`, `canUsePdfTools: false`) so the marketing/landing
            pages can render without dealing with an error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LicenseStatus"

  /usage/check:
    post:
      operationId: checkUsage
      tags: [usage]
      summary: Check whether the caller is allowed to perform a PDF action
      description: |
        Non-mutating gate. Returns `{ allowed, lockReason }` based on trial
        validity and today's usage count. The frontend should call this
        before starting an action; after a successful action it should call
        `recordUsage` (which re-checks server-side).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UsageCheckBody"
      responses:
        "200":
          description: Result of the check
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsageCheckResult"
        "401":
          description: Caller is not signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /usage/record:
    post:
      operationId: recordUsage
      tags: [usage]
      summary: Record one successful PDF action against today's quota
      description: |
        Atomically increments today's usage row by 1 (and the matching
        category counter). Re-checks the cap server-side and returns 403 if
        the action would exceed the daily limit — clients must not bypass
        this by calling `recordUsage` without a prior `checkUsage`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UsageRecordBody"
      responses:
        "200":
          description: Usage recorded; returns the updated counts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsageRecordResult"
        "401":
          description: Caller is not signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Action blocked (trial expired, subscription expired, or daily limit reached)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsageRecordResult"

  /license/activate:
    post:
      operationId: activateLicense
      tags: [license]
      summary: Redeem a product key for the caller on a specific device
      description: |
        Atomically: looks up the key by SHA-256 hash, checks the slot count
        (`current_activations < max_activations`) and key validity, upserts
        the device row, inserts a new `licenses` row whose subscription
        window starts now and ends `now + duration_days`, and increments
        the key's slot counter. Writes a `license_activated` audit event.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActivateLicenseBody"
      responses:
        "200":
          description: Activation successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivateLicenseResult"
        "400":
          description: Malformed product key or missing fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Caller is not signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Product key does not exist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Key revoked, expired, or out of activation slots
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /license/verify-product-key:
    post:
      operationId: verifyProductKey
      tags: [license]
      summary: Non-mutating check that a product key is currently redeemable
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyProductKeyBody"
      responses:
        "200":
          description: Verification result (always 200; see `valid` and `reason`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyProductKeyResult"
        "401":
          description: Caller is not signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /license/renew:
    post:
      operationId: renewLicense
      tags: [license]
      summary: Extend the subscription window of one of the caller's licenses
      description: |
        Redeems a fresh `productKey` against an existing license owned by
        the caller, extending `subscription_end_date` by the new key's
        `duration_days`. If the license is still active the new duration
        is added on top of the current end date so the customer never
        loses time they've paid for; if it has lapsed the renewal starts
        from "now". Consumes one activation slot on the new key. Writes
        a `license_renewed` audit event. Called by the Stripe payment-
        success webhook in Task #9 (which mints a per-renewal key under
        the hood) and by the in-app renewal flow.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RenewLicenseBody"
      responses:
        "200":
          description: Renewal applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RenewLicenseResult"
        "401":
          description: Caller is not signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: License not found or not owned by caller
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /license/deactivate-device:
    post:
      operationId: deactivateDevice
      tags: [license]
      summary: Free up an activation slot by deactivating one of the caller's licenses
      description: |
        Marks the license as `deactivated` and decrements the parent product
        key's `current_activations` so the slot can be reused on another
        device. The caller must own the license.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeactivateDeviceBody"
      responses:
        "200":
          description: Device deactivated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeactivateDeviceResult"
        "401":
          description: Caller is not signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: License not found or not owned by caller
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/product-keys/generate:
    post:
      operationId: adminGenerateProductKeys
      tags: [admin]
      summary: Mint a batch of product keys (admin only)
      parameters:
        - name: X-Admin-Token
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminGenerateKeysBody"
      responses:
        "200":
          description: Keys minted; raw key strings returned exactly once
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminGenerateKeysResult"
        "401":
          description: Missing or invalid X-Admin-Token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Admin access not configured on this server
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/product-keys:
    get:
      operationId: adminListProductKeys
      tags: [admin]
      summary: List minted product keys (admin only)
      parameters:
        - name: X-Admin-Token
          in: header
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of product keys (no raw keys, no hashes)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminListKeysResult"
        "401":
          description: Missing or invalid X-Admin-Token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/product-keys/revoke:
    post:
      operationId: adminRevokeProductKey
      tags: [admin]
      summary: Mark a product key as revoked so it can no longer be activated (admin only)
      parameters:
        - name: X-Admin-Token
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminRevokeKeyBody"
      responses:
        "200":
          description: Key revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminRevokeKeyResult"
        "401":
          description: Missing or invalid X-Admin-Token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Key not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/product-keys/extend:
    post:
      operationId: adminExtendProductKey
      tags: [admin]
      summary: Increase the duration_days on a not-yet-redeemed product key (admin only)
      parameters:
        - name: X-Admin-Token
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminExtendKeyBody"
      responses:
        "200":
          description: Duration extended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminExtendKeyResult"
        "401":
          description: Missing or invalid X-Admin-Token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Key not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /billing/providers:
    get:
      operationId: listBillingProviders
      tags: [billing]
      summary: List configured payment providers
      description: |
        Returns the per-provider availability so the pricing UI can render
        Stripe as a real Buy button and Razorpay/PayPal as "coming soon".
        A provider is "available" when its server-side credentials are
        present.
      responses:
        "200":
          description: Provider availability
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingProviders"

  /billing/checkout-session:
    post:
      operationId: createCheckoutSession
      tags: [billing]
      summary: Create a Stripe Checkout session for the chosen plan
      description: |
        Returns a `url` the client should redirect to. The session is bound
        to the signed-in Clerk user (via `client_reference_id` and
        `metadata.clerkUserId`). On success Stripe redirects back to
        `successUrl`; the webhook then mints a product key and renews /
        activates the user's license.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCheckoutSessionBody"
      responses:
        "200":
          description: Checkout session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCheckoutSessionResult"
        "400":
          description: Invalid plan or unsupported provider
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Caller is not signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Stripe not configured on this server
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /usage/today:
    get:
      operationId: getUsageToday
      tags: [usage]
      summary: Get today's usage breakdown for the caller
      responses:
        "200":
          description: Today's usage row (zero counters if nothing has been done today)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TodayUsage"
        "401":
          description: Caller is not signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /org:
    get:
      operationId: getOrg
      tags: [org]
      summary: Get the team the caller administers (members, devices, invites, seats)
      responses:
        "200":
          description: Organization summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrgSummary"
        "401":
          description: Caller is not signed in
          content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } }
        "404":
          description: Caller does not administer any organization
          content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } }

  /org/invite:
    post:
      operationId: inviteOrgMember
      tags: [org]
      summary: Invite an email address to the caller's team (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteMemberBody"
      responses:
        "200":
          description: Invite created and emailed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InviteMemberResult"
        "400":
          description: Invalid request body
          content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } }
        "401":
          description: Caller is not signed in
          content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } }
        "403":
          description: Caller does not administer any organization
          content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } }
        "409":
          description: Seats full, already a member, or already invited
          content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } }

  /org/revoke-invite:
    post:
      operationId: revokeOrgInvite
      tags: [org]
      summary: Revoke a pending invite (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RevokeInviteBody"
      responses:
        "200":
          description: Invite revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResult"
        "400":
          description: Invalid request body
          content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } }
        "401":
          description: Caller is not signed in
          content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } }
        "403":
          description: Caller does not administer any organization
          content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } }
        "404":
          description: Invite not found
          content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } }

  /org/accept-invite:
    post:
      operationId: acceptOrgInvite
      tags: [org]
      summary: Accept a team invite as the signed-in user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcceptInviteBody"
      responses:
        "200":
          description: Invite accepted; caller is now a member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptInviteResult"
        "400":
          description: Invalid or expired token, email mismatch, or org inactive
          content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } }
        "401":
          description: Caller is not signed in
          content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } }
        "409":
          description: No seats available
          content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } }

  /org/remove-member:
    post:
      operationId: removeOrgMember
      tags: [org]
      summary: Remove a member, freeing their seat (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RemoveMemberBody"
      responses:
        "200":
          description: Member removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResult"
        "400":
          description: Invalid request body or cannot remove the owner
          content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } }
        "401":
          description: Caller is not signed in
          content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } }
        "403":
          description: Caller does not administer any organization
          content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } }
        "404":
          description: Member not found
          content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } }

  /org/activate-device:
    post:
      operationId: activateOrgDevice
      tags: [org]
      summary: Bind a device for the signed-in team member (up to 2)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActivateOrgDeviceBody"
      responses:
        "200":
          description: Device bound
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivateOrgDeviceResult"
        "400":
          description: Invalid request body
          content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } }
        "401":
          description: Caller is not signed in
          content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } }
        "403":
          description: Caller is not an active team member
          content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } }
        "409":
          description: Device limit reached
          content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } }

  /org/deactivate-device:
    post:
      operationId: deactivateOrgDevice
      tags: [org]
      summary: Deactivate a member's device (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeactivateOrgDeviceBody"
      responses:
        "200":
          description: Device deactivated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResult"
        "400":
          description: Invalid request body
          content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } }
        "401":
          description: Caller is not signed in
          content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } }
        "403":
          description: Caller does not administer any organization
          content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } }
        "404":
          description: Device not found
          content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } }

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    PdfRecord:
      type: object
      properties:
        id:
          type: integer
        originalName:
          type: string
        fileSize:
          type: integer
        expiryDate:
          type: string
          description: ISO 8601 datetime (or legacy YYYY-MM-DD) after which the PDF expires
        expiryAction:
          type: string
          enum: [corrupt, revoke]
        isExpired:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - originalName
        - fileSize
        - expiryDate
        - expiryAction
        - isExpired
        - createdAt
        - updatedAt

    PdfUploadResult:
      type: object
      properties:
        id:
          type: integer
        shareToken:
          type: string
          description: Token required for all subsequent operations on this document
        originalName:
          type: string
        fileSize:
          type: integer
        expiryDate:
          type: string
          description: ISO 8601 datetime after which the PDF expires
        expiryAction:
          type: string
          enum: [corrupt, revoke]
        isExpired:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - shareToken
        - originalName
        - fileSize
        - expiryDate
        - expiryAction
        - isExpired
        - createdAt
        - updatedAt

    PdfStats:
      type: object
      properties:
        total:
          type: integer
        active:
          type: integer
        expired:
          type: integer
        totalSize:
          type: integer
      required:
        - total
        - active
        - expired
        - totalSize

    RevokeOtpRequestResult:
      type: object
      properties:
        otpId:
          type: integer
          description: Identifier for this OTP attempt – pass back to the verify endpoint
        code:
          type: string
          description: |
            The 6-digit OTP. Returned in the response only because no email
            service is configured — in production this would be sent to the
            company's contact email so they can pass it to the recipient.
        expiresAt:
          type: string
          format: date-time
          description: Timestamp after which the OTP can no longer be used
      required:
        - otpId
        - code
        - expiresAt

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    PdfActionType:
      type: string
      description: |
        Identifier for a billable PDF action. Used by `checkUsage` and
        `recordUsage`. Mapped server-side to one of three categories:
        `edit`, `convert`, or `secure`.
      enum:
        - merge
        - split
        - extract_pages
        - delete_pages
        - insert_pages
        - pdf_to_image
        - pdf_to_word
        - pdf_to_excel
        - image_to_pdf
        - word_to_pdf
        - excel_to_pdf
        - password_protect
        - set_expiry
        - revoke_expiry
        - copy_restriction
        - print_restriction

    LicenseLockReason:
      type: string
      description: Why PDF tools are currently blocked, or `none` if allowed.
      enum:
        - none
        - not_logged_in
        - trial_expired
        - subscription_expired
        - daily_limit_reached
        - account_suspended

    LicenseStatusValue:
      type: string
      enum:
        - anonymous
        - trial
        - trial_expired
        - active
        - expired
        - suspended

    LicenseStatus:
      type: object
      description: Single source of truth for whether the caller can use PDF tools.
      properties:
        loggedIn:
          type: boolean
        trialActive:
          type: boolean
        trialDaysRemaining:
          type: integer
          description: Whole days remaining (rounded down). 0 once the trial has lapsed.
        trialExpired:
          type: boolean
        trialStartDate:
          type: ["string", "null"]
          format: date-time
          description: ISO 8601 server time when the trial started; null if not signed in.
        trialEndDate:
          type: ["string", "null"]
          format: date-time
        todayUsage:
          type: integer
          description: Total PDF actions the caller has performed today (server UTC date).
        dailyLimit:
          type: integer
          description: Maximum PDF actions allowed today. 5 during trial; effectively unlimited (a large number) for paid users.
        isPaid:
          type: boolean
          description: True when the caller has an active paid subscription. Always false at this stage.
        planName:
          type: ["string", "null"]
          description: Plan name when paid (e.g. "monthly", "yearly"); null otherwise.
        subscriptionActive:
          type: boolean
        subscriptionDaysRemaining:
          type: ["integer", "null"]
        subscriptionExpired:
          type: boolean
        subscriptionStartDate:
          type: ["string", "null"]
          format: date-time
        subscriptionEndDate:
          type: ["string", "null"]
          format: date-time
        licenseStatus:
          $ref: "#/components/schemas/LicenseStatusValue"
        canUsePdfTools:
          type: boolean
        lockReason:
          $ref: "#/components/schemas/LicenseLockReason"
        serverTime:
          type: string
          format: date-time
          description: Current server time at the moment this status was computed.
      required:
        - loggedIn
        - trialActive
        - trialDaysRemaining
        - trialExpired
        - trialStartDate
        - trialEndDate
        - todayUsage
        - dailyLimit
        - isPaid
        - planName
        - subscriptionActive
        - subscriptionDaysRemaining
        - subscriptionExpired
        - subscriptionStartDate
        - subscriptionEndDate
        - licenseStatus
        - canUsePdfTools
        - lockReason
        - serverTime

    UsageCheckBody:
      type: object
      properties:
        actionType:
          $ref: "#/components/schemas/PdfActionType"
      required:
        - actionType

    UsageCheckResult:
      type: object
      properties:
        allowed:
          type: boolean
        lockReason:
          $ref: "#/components/schemas/LicenseLockReason"
        todayUsage:
          type: integer
        dailyLimit:
          type: integer
      required:
        - allowed
        - lockReason
        - todayUsage
        - dailyLimit

    UsageRecordBody:
      type: object
      properties:
        actionType:
          $ref: "#/components/schemas/PdfActionType"
        fileCount:
          type: integer
          description: How many files this action processed. Each file counts as one against the daily quota. Defaults to 1.
          default: 1
          minimum: 1
      required:
        - actionType

    UsageRecordResult:
      type: object
      properties:
        recorded:
          type: boolean
          description: True if the increment was applied; false if blocked (in which case `lockReason` will explain).
        lockReason:
          $ref: "#/components/schemas/LicenseLockReason"
        todayUsage:
          type: integer
        dailyLimit:
          type: integer
      required:
        - recorded
        - lockReason
        - todayUsage
        - dailyLimit

    TodayUsage:
      type: object
      properties:
        usageDate:
          type: string
          description: Server UTC date in YYYY-MM-DD format.
        editCount:
          type: integer
        convertCount:
          type: integer
        secureCount:
          type: integer
        totalCount:
          type: integer
        dailyLimit:
          type: integer
      required:
        - usageDate
        - editCount
        - convertCount
        - secureCount
        - totalCount
        - dailyLimit

    ProductKeyPlan:
      type: string
      description: Subscription tier a product key unlocks.
      enum:
        - monthly
        - quarterly
        - yearly
        - lifetime

    ActivateLicenseBody:
      type: object
      properties:
        productKey:
          type: string
          description: The raw `LUXOR-XXXX-XXXX-XXXX-XXXX` key shown to the customer.
        deviceId:
          type: string
          description: Opaque client-generated UUID identifying this install.
        deviceName:
          type: ["string", "null"]
        os:
          type: ["string", "null"]
      required:
        - productKey
        - deviceId

    ActivateLicenseResult:
      type: object
      properties:
        licenseId:
          type: integer
        planName:
          $ref: "#/components/schemas/ProductKeyPlan"
        subscriptionStartDate:
          type: string
          format: date-time
        subscriptionEndDate:
          type: string
          format: date-time
        slotsRemaining:
          type: integer
          description: Activations still available on this product key after this redemption.
      required:
        - licenseId
        - planName
        - subscriptionStartDate
        - subscriptionEndDate
        - slotsRemaining

    VerifyProductKeyBody:
      type: object
      properties:
        productKey:
          type: string
      required:
        - productKey

    VerifyProductKeyResult:
      type: object
      description: |
        Read-only check before showing the activation confirmation dialog.
        Always returns 200 — `valid: false` + a `reason` describes failures
        (malformed, not_found, revoked, expired, max_activations_reached).
      properties:
        valid:
          type: boolean
        planName:
          oneOf:
            - $ref: "#/components/schemas/ProductKeyPlan"
            - type: "null"
        durationDays:
          type: ["integer", "null"]
        slotsAvailable:
          type: ["integer", "null"]
        reason:
          type: ["string", "null"]
          enum:
            - malformed
            - not_found
            - revoked
            - expired
            - max_activations_reached
            - null
      required:
        - valid

    RenewLicenseBody:
      type: object
      description: |
        Redeem a fresh product key against one of the caller's existing
        licenses, extending its `subscription_end_date` by the new key's
        `duration_days`. Consumes one activation slot on the new key. Used
        by the Stripe payment-success webhook in Task #9 (which mints a
        per-renewal key under the hood) and by the in-app renewal flow.
      properties:
        licenseId:
          type: integer
        productKey:
          type: string
      required:
        - licenseId
        - productKey

    RenewLicenseResult:
      type: object
      properties:
        licenseId:
          type: integer
        subscriptionEndDate:
          type: string
          format: date-time
      required:
        - licenseId
        - subscriptionEndDate

    DeactivateDeviceBody:
      type: object
      properties:
        licenseId:
          type: integer
      required:
        - licenseId

    DeactivateDeviceResult:
      type: object
      properties:
        licenseId:
          type: integer
        status:
          type: string
        slotsRemaining:
          type: integer
      required:
        - licenseId
        - status
        - slotsRemaining

    AdminGenerateKeysBody:
      type: object
      properties:
        planName:
          $ref: "#/components/schemas/ProductKeyPlan"
        count:
          type: integer
          minimum: 1
          maximum: 1000
          default: 1
        maxActivations:
          type: integer
          minimum: 1
          default: 1
        expiresAt:
          type: ["string", "null"]
          format: date-time
          description: Optional cut-off after which this key can no longer be redeemed.
        notes:
          type: ["string", "null"]
      required:
        - planName
        - count

    AdminMintedKey:
      type: object
      description: |
        A single freshly-minted key. The `rawKey` field is returned ONCE in
        the generate response and never again — only its hash is stored.
      properties:
        id:
          type: integer
        rawKey:
          type: string
        keyPrefix:
          type: string
        planName:
          $ref: "#/components/schemas/ProductKeyPlan"
        durationDays:
          type: integer
        maxActivations:
          type: integer
        expiresAt:
          type: ["string", "null"]
          format: date-time
      required:
        - id
        - rawKey
        - keyPrefix
        - planName
        - durationDays
        - maxActivations

    AdminGenerateKeysResult:
      type: object
      properties:
        keys:
          type: array
          items:
            $ref: "#/components/schemas/AdminMintedKey"
      required:
        - keys

    AdminProductKeySummary:
      type: object
      description: Listing row — never includes the raw key or its hash.
      properties:
        id:
          type: integer
        keyPrefix:
          type: string
        planName:
          $ref: "#/components/schemas/ProductKeyPlan"
        durationDays:
          type: integer
        maxActivations:
          type: integer
        currentActivations:
          type: integer
        status:
          type: string
        expiresAt:
          type: ["string", "null"]
          format: date-time
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        revokedAt:
          type: ["string", "null"]
          format: date-time
      required:
        - id
        - keyPrefix
        - planName
        - durationDays
        - maxActivations
        - currentActivations
        - status
        - createdAt

    AdminListKeysResult:
      type: object
      properties:
        keys:
          type: array
          items:
            $ref: "#/components/schemas/AdminProductKeySummary"
      required:
        - keys

    AdminRevokeKeyBody:
      type: object
      properties:
        id:
          type: integer
      required:
        - id

    AdminRevokeKeyResult:
      type: object
      properties:
        id:
          type: integer
        status:
          type: string
      required:
        - id
        - status

    AdminExtendKeyBody:
      type: object
      properties:
        id:
          type: integer
        additionalDays:
          type: integer
          minimum: 1
      required:
        - id
        - additionalDays

    BillingProvider:
      type: string
      enum: [stripe, razorpay, paypal]

    BillingProviderInfo:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/BillingProvider"
        displayName:
          type: string
        available:
          type: boolean
        comingSoon:
          type: boolean
      required:
        - id
        - displayName
        - available
        - comingSoon

    BillingProviders:
      type: object
      properties:
        providers:
          type: array
          items:
            $ref: "#/components/schemas/BillingProviderInfo"
      required:
        - providers

    CreateCheckoutSessionBody:
      type: object
      properties:
        plan:
          $ref: "#/components/schemas/CheckoutPlan"
        provider:
          $ref: "#/components/schemas/BillingProvider"
        seats:
          type: ["integer", "null"]
          description: Seat count for a `team` plan (subscription quantity). Ignored for individual plans.
        orgName:
          type: ["string", "null"]
          description: Display name for the team/organization (team plan only).
        successUrl:
          type: string
          description: Absolute URL Stripe redirects to on success.
        cancelUrl:
          type: string
          description: Absolute URL Stripe redirects to on cancel.
      required:
        - plan
        - successUrl
        - cancelUrl

    CreateCheckoutSessionResult:
      type: object
      properties:
        provider:
          $ref: "#/components/schemas/BillingProvider"
        sessionId:
          type: string
        url:
          type: string
      required:
        - provider
        - url

    AdminExtendKeyResult:
      type: object
      properties:
        id:
          type: integer
        durationDays:
          type: integer
      required:
        - id
        - durationDays

    CheckoutPlan:
      type: string
      enum:
        - monthly
        - quarterly
        - yearly
        - lifetime
        - team

    OrgRole:
      type: string
      enum:
        - admin
        - member

    OrgDevice:
      type: object
      properties:
        deviceId:
          type: string
        deviceName:
          type: ["string", "null"]
        os:
          type: ["string", "null"]
        firstActivatedAt:
          type: string
          format: date-time
        lastSeenAt:
          type: string
          format: date-time
      required:
        - deviceId
        - firstActivatedAt
        - lastSeenAt

    OrgMember:
      type: object
      properties:
        userId:
          type: string
        email:
          type: ["string", "null"]
        role:
          type: string
        status:
          type: string
        joinedAt:
          type: string
          format: date-time
        devices:
          type: array
          items:
            $ref: "#/components/schemas/OrgDevice"
      required:
        - userId
        - role
        - status
        - joinedAt
        - devices

    OrgPendingInvite:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        role:
          type: string
        invitedBy:
          type: string
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
      required:
        - id
        - email
        - role
        - invitedBy
        - createdAt
        - expiresAt

    OrgSummary:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        planName:
          type: string
        status:
          type: string
        maxSeats:
          type: integer
        seatsUsed:
          type: integer
        seatsAvailable:
          type: integer
        subscriptionStartDate:
          type: string
          format: date-time
        subscriptionEndDate:
          type: string
          format: date-time
        subscriptionActive:
          type: boolean
        isOwner:
          type: boolean
        members:
          type: array
          items:
            $ref: "#/components/schemas/OrgMember"
        pendingInvites:
          type: array
          items:
            $ref: "#/components/schemas/OrgPendingInvite"
      required:
        - id
        - name
        - planName
        - status
        - maxSeats
        - seatsUsed
        - seatsAvailable
        - subscriptionStartDate
        - subscriptionEndDate
        - subscriptionActive
        - isOwner
        - members
        - pendingInvites

    InviteMemberBody:
      type: object
      properties:
        email:
          type: string
          format: email
        role:
          $ref: "#/components/schemas/OrgRole"
      required:
        - email

    InviteMemberResult:
      type: object
      properties:
        email:
          type: string
        role:
          type: string
        expiresAt:
          type: string
          format: date-time
        emailSent:
          type: boolean
      required:
        - email
        - role
        - expiresAt
        - emailSent

    RevokeInviteBody:
      type: object
      properties:
        inviteId:
          type: integer
      required:
        - inviteId

    AcceptInviteBody:
      type: object
      properties:
        token:
          type: string
      required:
        - token

    AcceptInviteResult:
      type: object
      properties:
        orgName:
          type: string
        role:
          type: string
      required:
        - orgName
        - role

    RemoveMemberBody:
      type: object
      properties:
        userId:
          type: string
      required:
        - userId

    ActivateOrgDeviceBody:
      type: object
      properties:
        deviceId:
          type: string
        deviceName:
          type: ["string", "null"]
        os:
          type: ["string", "null"]
      required:
        - deviceId

    ActivateOrgDeviceResult:
      type: object
      properties:
        deviceId:
          type: string
        devicesUsed:
          type: integer
        devicesAllowed:
          type: integer
      required:
        - deviceId
        - devicesUsed
        - devicesAllowed

    DeactivateOrgDeviceBody:
      type: object
      properties:
        userId:
          type: string
        deviceId:
          type: string
      required:
        - userId
        - deviceId

    OkResult:
      type: object
      properties:
        ok:
          type: boolean
      required:
        - ok
