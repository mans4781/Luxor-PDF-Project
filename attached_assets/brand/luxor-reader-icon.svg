<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 360" fill="none" role="img" aria-label="Luxor PDF Reader icon">
  <defs>
    <clipPath id="reader-doc-clip">
      <path d="M28 32 Q28 0 60 0 L218 0 L308 96 L308 328 Q308 360 276 360 L60 360 Q28 360 28 328 Z"/>
    </clipPath>
    <linearGradient id="reader-badge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FCD34D"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>

  <!-- Navy document body, rounded with cut top-right corner (Luxor family base) -->
  <path d="M28 32 Q28 0 60 0 L218 0 L308 96 L308 328 Q308 360 276 360 L60 360 Q28 360 28 328 Z"
        fill="#1E3A8A"/>

  <!-- Red bottom sweep -->
  <g clip-path="url(#reader-doc-clip)">
    <path d="M-30 270 C 80 360 220 360 360 200 L360 380 L-30 380 Z" fill="#DC2626"/>
  </g>

  <!-- Subtle diagonal fold-mark line -->
  <path d="M218 32 L 80 330" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.55"/>

  <!-- Red folded corner -->
  <path d="M218 0 L308 96 L228 96 Q218 96 218 86 Z" fill="#DC2626"/>

  <!-- White L letterform (preserves Luxor identity) -->
  <path d="M86 70 L86 270 L238 270 L238 222 L150 222 L150 70 Z" fill="#FFFFFF"/>

  <!-- ============================================== -->
  <!-- READER badge: amber circle with open-book glyph -->
  <!-- ============================================== -->
  <g>
    <!-- Outer navy ring for separation against red sweep -->
    <circle cx="246" cy="296" r="56" fill="#1E3A8A"/>
    <!-- Amber badge body -->
    <circle cx="246" cy="296" r="48" fill="url(#reader-badge)"/>
    <!-- Open-book glyph -->
    <g transform="translate(246 296)" fill="none" stroke="#1E3A8A" stroke-width="6"
       stroke-linecap="round" stroke-linejoin="round">
      <!-- left page -->
      <path d="M-26 -14 Q-14 -22 0 -18 L0 18 Q-14 14 -26 22 Z" fill="#FFFFFF"/>
      <!-- right page -->
      <path d="M26 -14 Q14 -22 0 -18 L0 18 Q14 14 26 22 Z" fill="#FFFFFF"/>
      <!-- spine -->
      <path d="M0 -18 L0 18"/>
      <!-- text lines -->
      <path d="M-20 -8 L-7 -10" stroke-width="3"/>
      <path d="M-20 0 L-7 -2" stroke-width="3"/>
      <path d="M7 -10 L20 -8" stroke-width="3"/>
      <path d="M7 -2 L20 0" stroke-width="3"/>
    </g>
  </g>
</svg>
