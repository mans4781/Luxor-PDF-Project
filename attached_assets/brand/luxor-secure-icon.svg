<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 360" fill="none" role="img" aria-label="Luxor PDF Secure icon">
  <defs>
    <clipPath id="secure-doc-clip">
      <path d="M28 32 Q28 0 60 0 L218 0 L308 96 L308 328 Q308 360 276 360 L60 360 Q28 360 28 328 Z"/>
    </clipPath>
    <linearGradient id="secure-badge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34D399"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
  </defs>

  <!-- Navy document body (Luxor family base) -->
  <path d="M28 32 Q28 0 60 0 L218 0 L308 96 L308 328 Q308 360 276 360 L60 360 Q28 360 28 328 Z"
        fill="#1E3A8A"/>

  <!-- Red bottom sweep -->
  <g clip-path="url(#secure-doc-clip)">
    <path d="M-30 270 C 80 360 220 360 360 200 L360 380 L-30 380 Z" fill="#DC2626"/>
  </g>

  <!-- Subtle diagonal fold-mark line -->
  <path d="M218 32 L 80 330" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.55"/>

  <!-- Red folded corner -->
  <path d="M218 0 L308 96 L228 96 Q218 96 218 86 Z" fill="#DC2626"/>

  <!-- White L letterform (preserves Luxor identity) -->
  <path d="M86 70 L86 270 L238 270 L238 222 L150 222 L150 70 Z" fill="#FFFFFF"/>

  <!-- ================================================== -->
  <!-- SECURE badge: emerald shield with white padlock     -->
  <!-- ================================================== -->
  <g>
    <!-- Outer navy ring for separation against red sweep -->
    <path d="M246 240
             L302 256
             L302 308
             Q302 340 246 358
             Q190 340 190 308
             L190 256 Z"
          fill="#1E3A8A"/>
    <!-- Emerald shield body -->
    <path d="M246 248
             L296 262
             L296 306
             Q296 332 246 348
             Q196 332 196 306
             L196 262 Z"
          fill="url(#secure-badge)"/>

    <!-- White padlock -->
    <g transform="translate(246 300)">
      <!-- Shackle -->
      <path d="M-14 -8 Q-14 -24 0 -24 Q14 -24 14 -8 L14 0"
            stroke="#FFFFFF" stroke-width="6" fill="none" stroke-linecap="round"/>
      <!-- Body -->
      <rect x="-18" y="-2" width="36" height="28" rx="4" fill="#FFFFFF"/>
      <!-- Keyhole -->
      <circle cx="0" cy="9" r="3.5" fill="#059669"/>
      <rect x="-1.6" y="9" width="3.2" height="9" fill="#059669"/>
    </g>
  </g>
</svg>
