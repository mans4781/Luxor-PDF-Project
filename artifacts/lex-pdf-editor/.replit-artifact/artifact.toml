kind = "web"
previewPath = "/lex-pdf-editor/"
title = "LexPDF Editor"
version = "1.0.0"
id = "artifacts/lex-pdf-editor"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/lex-pdf-editor/" ]
localPort = 20818

[services.development]
run = "pnpm --filter @workspace/lex-pdf-editor run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lex-pdf-editor", "run", "build" ]
publicDir = "artifacts/lex-pdf-editor/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20818"
BASE_PATH = "/lex-pdf-editor/"
