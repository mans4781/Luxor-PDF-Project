kind = "web"
previewPath = "/esign-app/"
title = "LexSign — eSign App"
version = "1.0.0"
id = "artifacts/esign-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/esign-app/" ]
localPort = 20963

[services.development]
run = "pnpm --filter @workspace/esign-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/esign-app", "run", "build" ]
publicDir = "artifacts/esign-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20963"
BASE_PATH = "/esign-app/"
