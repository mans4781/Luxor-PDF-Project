kind = "web"
previewPath = "/"
title = "Root Redirect"
version = "1.0.0"
id = "artifacts/root-redirect"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21558

[services.development]
run = "pnpm --filter @workspace/root-redirect run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/root-redirect", "run", "build" ]
publicDir = "artifacts/root-redirect/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21558"
BASE_PATH = "/"
