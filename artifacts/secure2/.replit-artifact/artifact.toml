kind = "web"
previewPath = "/secure2/"
title = "Secure2"
version = "1.0.0"
id = "artifacts/secure2"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/secure2/" ]
localPort = 21503

[services.development]
run = "pnpm --filter @workspace/secure2 run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/secure2", "run", "build" ]
publicDir = "artifacts/secure2/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21503"
BASE_PATH = "/secure2/"
