kind = "web"
previewPath = "/app/"
title = "PDF Security Tool"
version = "1.0.0"
id = "artifacts/pdf-expiry"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/app/", "/pdf-expiry/", "/online-tools", "/tools", "/tools/" ]
localPort = 19050

[services.development]
run = "pnpm --filter @workspace/pdf-expiry run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pdf-expiry", "run", "build" ]
publicDir = "artifacts/pdf-expiry/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19050"
BASE_PATH = "/app/"
